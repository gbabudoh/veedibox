<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div onClick="{{ openClick }}" style="cursor:pointer;border-radius:16px;overflow:hidden;border:1px solid oklch(91% 0.01 85);background:#fff;display:flex;flex-direction:column">
  <div style="{{ p.bg }}height:170px"></div>
  <div style="padding:14px 16px;display:flex;flex-direction:column;gap:6px;flex:1">
    <div style="font-size:11px;font-weight:700;color:oklch(58% 0.16 265);text-transform:uppercase;letter-spacing:0.05em">{{ p.style }}</div>
    <div style="font-weight:700;font-size:14.5px;line-height:1.3">{{ p.title }}</div>
    <div style="flex:1"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:6px">
      <div style="font-weight:800;font-size:15px">${{ p.price }}</div>
      <button onClick="{{ quickAddClick }}" style="border:1px solid oklch(85% 0.01 85);background:#fff;font-weight:700;font-size:12px;padding:7px 12px;border-radius:8px;cursor:pointer">Quick add</button>
    </div>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:280,&quot;height&quot;:290}}">
class Component extends DCLogic {
  renderVals(){
    const p = this.props.p || {};
    const onAdd = this.props.onAdd;
    const onOpen = this.props.onOpen || (()=>{});
    return {
      p,
      openClick: () => onOpen(p.id),
      quickAddClick: (e) => { e.stopPropagation(); if (onAdd) onAdd(p.id); }
    };
  }
}
</script>
</body>
</html>
