version: "3.9"
services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: veedibox
      POSTGRES_PASSWORD: veedibox
      POSTGRES_DB: veedibox
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: veedibox
      MINIO_ROOT_PASSWORD: veedibox-secret
    ports: ["9000:9000", "9001:9001"]
    volumes: ["miniodata:/data"]

  imgproxy:
    image: darthsim/imgproxy
    restart: unless-stopped
    environment:
      IMGPROXY_KEY: ${IMGPROXY_KEY}
      IMGPROXY_SALT: ${IMGPROXY_SALT}
      IMGPROXY_USE_S3: "true"
      IMGPROXY_S3_ENDPOINT: "http://minio:9000"
    ports: ["8080:8080"]
    depends_on: [minio]

volumes:
  pgdata:
  miniodata:
